services:
  postgres:
    image: postgres:16-alpine
    container_name: pazo-db
    environment:
      POSTGRES_USER: pazo
      POSTGRES_PASSWORD: pazosecret
      POSTGRES_DB: pazo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pazo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
